# This is the configuration file for tasosh

# Logs configurations
keep_arg_on_logs=true
save_logs_to_file=true

# Prompt configurations
prompt="%USER%@%HOST%:%POS%$ "

# Debug configurations
debug_mode=false

# Aliases
alias=example_alias=echo test_alias

# Some default aliases

alias=ls=ls --color=auto
alias=ll=ls -lh --color=auto
alias=la=ls -A --color=auto

alias=grep=grep --color=auto

alias=cls=clear

alias=..=cd ..